{% extends 'base.html' %}

{% block content %}

<style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&family=Great+Vibes&family=DM+Sans:wght@300;400;500;600&display=swap');

    :root {
        --blue: #1a8fc4;
        --blue-mid: #3ab4e0;
        --dark: #0d2d45;
        --text: #2e5570;
        --white: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: 'DM Sans', sans-serif;
        background: #eef6fb;
        min-height: 100vh;
        overflow-x: hidden;
        position: relative;
    }

    body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
            radial-gradient(ellipse at 10% 50%, rgba(60,170,220,0.10) 0%, transparent 60%),
            radial-gradient(ellipse at 90% 20%, rgba(60,170,220,0.07) 0%, transparent 50%),
            radial-gradient(ellipse at 50% 100%, rgba(100,200,255,0.08) 0%, transparent 50%);
        z-index: 0;
    }

    .page-wrapper {
        position: relative;
        z-index: 1;
        padding: 70px 20px 90px;
        max-width: 760px;
        margin: 0 auto;
    }

    .header-block {
        text-align: center;
        margin-bottom: 48px;
    }

    .header-eyebrow {
        font-family: 'Cormorant Garamond', serif;
        font-weight: 600;
        font-size: 0.85rem;
        letter-spacing: 5px;
        text-transform: uppercase;
        color: var(--blue);
        margin-bottom: 14px;
    }

    .header-title {
        font-family: 'Great Vibes', cursive;
        font-size: clamp(2.6rem, 6vw, 4.2rem);
        color: var(--dark);
        line-height: 1;
        margin-bottom: 18px;
    }

    .header-divider {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 18px;
    }

    .header-divider span {
        display: block;
        height: 1px;
        width: 70px;
        background: linear-gradient(to right, transparent, var(--blue-mid));
    }

    .header-divider i {
        display: block;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--blue-mid);
    }

    .form-card {
        background: #ffffff;
        border: 1px solid #c2dff0;
        border-top: 4px solid var(--blue-mid);
        border-radius: 12px;
        padding: 44px 48px;
        box-shadow: 0 8px 30px rgba(0,80,160,0.10);
        animation: cardIn 0.6s ease both;
        animation-delay: 0.1s;
    }

    @keyframes cardIn {
        from { opacity: 0; transform: translateY(24px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    .field-wrap {
        margin-bottom: 28px;
    }

    .field-label {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-family: 'Cormorant Garamond', serif;
        font-weight: 700;
        font-size: 0.82rem;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--blue);
        margin-bottom: 10px;
    }

    .field-label::before {
        content: '';
        display: block;
        width: 16px;
        height: 1px;
        background: var(--blue-mid);
        opacity: 0.6;
    }

    input[type="text"],
    input[type="email"],
    textarea,
    select {
        width: 100%;
        background: #f4f8ff !important;
        border: 1.5px solid #c2dff0 !important;
        border-radius: 8px !important;
        padding: 13px 16px !important;
        color: var(--dark) !important;
        font-family: 'DM Sans', sans-serif;
        font-size: 14px;
        font-weight: 400;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
    }

    .members-scroll {
        background: #f4f8ff;
        border: 1.5px solid #c2dff0;
        border-radius: 8px;
        padding: 14px 16px;
        max-height: 200px;
        overflow-y: auto;
    }

    .members-scroll label {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 7px 4px;
        color: var(--text);
        font-size: 14px;
        cursor: pointer;
        border-bottom: 1px solid #e0f0f8;
        transition: color 0.2s;
    }

    .members-scroll label:last-child {
        border-bottom: none;
    }

    .members-scroll label:hover {
        color: var(--dark);
    }

    .members-scroll input[type="checkbox"] {
        width: 15px !important;
        height: 15px !important;
        accent-color: var(--blue);
        border: none !important;
        padding: 0 !important;
        background: transparent !important;
        box-shadow: none !important;
        flex-shrink: 0;
    }

    .members-scroll::-webkit-scrollbar { width: 4px; }
    .members-scroll::-webkit-scrollbar-track { background: transparent; }
    .members-scroll::-webkit-scrollbar-thumb { background: #c2dff0; border-radius: 4px; }

    .field-divider {
        height: 1px;
        background: linear-gradient(90deg, #c2dff0, transparent);
        margin: 6px 0 28px;
    }

    .btn-submit {
        display: block;
        width: 100%;
        margin-top: 10px;
        padding: 15px;
        background: var(--dark);
        color: var(--white);
        border: 1.5px solid var(--dark);
        border-radius: 8px;
        font-family: 'DM Sans', sans-serif;
        font-weight: 600;
        font-size: 11px;
        letter-spacing: 3px;
        text-transform: uppercase;
        cursor: pointer;
        transition: 0.25s;
    }

    .btn-submit:hover {
        background: var(--blue);
        color: var(--white);
        border-color: var(--blue);
        box-shadow: 0 8px 25px rgba(26,143,196,0.25);
        transform: translateY(-2px);
    }
</style>

<div class="page-wrapper">

    <div class="header-block">
        <p class="header-eyebrow">Grupos artísticos</p>
        <h1 class="header-title">Crear agrupación</h1>
        <div class="header-divider">
            <span></span><i></i><span></span>
        </div>
    </div>

    <div class="form-card">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="field-wrap">
                <label class="field-label">Nombre</label>
                {{ form.name }}
            </div>

            <div class="field-divider"></div>

            <div class="field-wrap">
                <label class="field-label">Descripción</label>
                {{ form.description }}
            </div>

            <div class="field-divider"></div>

            <div class="field-wrap">
                <label class="field-label">Imagen del grupo</label>
                {{ form.profile_image }}
            </div>

            <div class="field-divider"></div>

            <div class="field-wrap">
                <label class="field-label">Miembros</label>
                <div class="members-scroll">
                    {% for artista in form.members.field.queryset %}
                        <label>
                            <input type="checkbox" 
                                   name="members" 
                                   value="{{ artista.id }}"
                                   {% if form.members.value and artista.id in form.members.value %}checked{% endif %}>
                            {{ artista.stage_name }}
                        </label>
                    {% empty %}
                        <p style="color:#5a7a90; padding: 20px 10px; text-align: center; font-style: italic;">
                            No hay artistas registrados.
                        </p>
                    {% endfor %}
                </div>
            </div>

            <button type="submit" class="btn-submit">
                Crear grupo →
            </button>

        </form>
    </div>
</div>

{% endblock %}
