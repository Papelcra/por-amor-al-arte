{% extends 'base.html' %}

{% block content %}

<style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400;1,700&family=DM+Sans:wght@300;400;500;600&display=swap');

    :root {
        --teal: #0ec4d8;
        --teal-dark: #0a9aaa;
        --white: #ffffff;
        --black: #0a0a0a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: 'DM Sans', sans-serif;
        background: #001840;
        min-height: 100vh;
        overflow-x: hidden;
        position: relative;
    }

    body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
            radial-gradient(ellipse 70% 55% at 15% 15%, rgba(14,196,216,0.18) 0%, transparent 60%),
            radial-gradient(ellipse 60% 70% at 85% 80%, rgba(0,64,204,0.35) 0%, transparent 60%),
            radial-gradient(ellipse 50% 50% at 50% 50%, rgba(26,107,255,0.10) 0%, transparent 70%),
            linear-gradient(150deg, #001840 0%, #002a6e 35%, #003580 55%, #001d55 100%);
        z-index: 0;
        animation: bgShift 14s ease-in-out infinite alternate;
    }

    @keyframes bgShift {
        0%   { filter: hue-rotate(0deg) brightness(1); }
        50%  { filter: hue-rotate(12deg) brightness(1.06); }
        100% { filter: hue-rotate(-8deg) brightness(0.96); }
    }

    /* === BURBUJAS FLOTANTES === */
    .bubbles {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
    }

    .bubble {
        position: absolute;
        bottom: -120px;
        border-radius: 50%;
        animation: floatUp linear infinite;
    }

    .bubble:nth-child(1)  { width: 35px; height: 35px; left: 7%;  animation-duration: 15s; animation-delay: 0s;  background: rgba(14,196,216,0.08); }
    .bubble:nth-child(2)  { width: 60px; height: 60px; left: 19%; animation-duration: 19s; animation-delay: 3s;  background: rgba(255,255,255,0.04); }
    .bubble:nth-child(3)  { width: 22px; height: 22px; left: 33%; animation-duration: 11s; animation-delay: 1s;  background: rgba(14,196,216,0.06); }
    .bubble:nth-child(4)  { width: 80px; height: 80px; left: 49%; animation-duration: 22s; animation-delay: 5s;  background: rgba(26,107,255,0.10); }
    .bubble:nth-child(5)  { width: 30px; height: 30px; left: 63%; animation-duration: 13s; animation-delay: 2s;  background: rgba(14,196,216,0.07); }
    .bubble:nth-child(6)  { width: 50px; height: 50px; left: 75%; animation-duration: 17s; animation-delay: 7s;  background: rgba(255,255,255,0.03); }
    .bubble:nth-child(7)  { width: 18px; height: 18px; left: 86%; animation-duration: 10s; animation-delay: 4s;  background: rgba(14,196,216,0.09); }
    .bubble:nth-child(8)  { width: 55px; height: 55px; left: 93%; animation-duration: 20s; animation-delay: 0s;  background: rgba(26,107,255,0.08); }

    @keyframes floatUp {
        0%   { transform: translateY(0) scale(1);        opacity: 0; }
        10%  { opacity: 1; }
        90%  { opacity: 0.5; }
        100% { transform: translateY(-110vh) scale(1.15); opacity: 0; }
    }

    /* === WRAPPER === */
    .page-wrapper {
        position: relative;
        z-index: 1;
        padding: 80px 30px 100px;
        max-width: 1100px;
        margin: 0 auto;
    }

    /* === HEADER === */
    .header-block {
        text-align: center;
        margin-bottom: 60px;
    }

    .header-eyebrow {
        font-weight: 500;
        font-size: 0.75rem;
        letter-spacing: 5px;
        text-transform: uppercase;
        color: var(--teal);
        margin-bottom: 12px;
    }

    .header-title {
        font-family: 'Playfair Display', serif;
        font-style: italic;
        font-weight: 700;
        font-size: clamp(2.8rem, 6vw, 4.8rem);
        color: var(--white);
        line-height: 1;
        letter-spacing: -2px;
        margin-bottom: 20px;
        animation: titleGlow 4s ease-in-out infinite alternate;
    }

    @keyframes titleGlow {
        0%   { text-shadow: 0 0 40px rgba(14,196,216,0.2); }
        100% { text-shadow: 0 0 80px rgba(14,196,216,0.45), 0 0 130px rgba(26,107,255,0.25); }
    }

    .header-divider {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 14px;
        margin-bottom: 16px;
    }

    .header-divider span {
        display: block;
        height: 1px;
        width: 80px;
        background: linear-gradient(90deg, transparent, var(--teal), transparent);
    }

    .header-divider i {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--teal);
        box-shadow: 0 0 10px var(--teal);
    }

    /* === FORM CARD === */
    .form-card {
        background: rgba(255,255,255,0.07);
        border: 1px solid rgba(14,196,216,0.25);
        border-top: 4px solid var(--teal);
        border-radius: 24px;
        padding: 45px 40px;
        backdrop-filter: blur(18px);
        box-shadow: 0 25px 70px rgba(0, 0, 40, 0.5);
        transition: all 0.4s ease;
    }

    .form-card:hover {
        box-shadow: 0 30px 85px rgba(0, 0, 40, 0.6);
    }

    /* Labels */
    .form-label {
        font-weight: 600;
        color: var(--teal);
        font-size: 0.95rem;
        letter-spacing: 1.2px;
        text-transform: uppercase;
        margin-bottom: 10px;
        display: block;
    }

    /* Inputs y Textarea */
    .form-control {
        background: rgba(255,255,255,0.08);
        border: 2px solid rgba(14,196,216,0.3);
        border-radius: 16px;
        padding: 16px 20px;
        color: white;
        font-size: 1.02rem;
        transition: all 0.3s ease;
    }

    .form-control:focus {
        border-color: var(--teal);
        box-shadow: 0 0 0 4px rgba(14,196,216,0.25);
        background: rgba(255,255,255,0.12);
        outline: none;
    }

    .form-control::placeholder {
        color: rgba(255,255,255,0.4);
    }

    /* Miembros Scroll */
    .members-scroll {
        background: rgba(255,255,255,0.06);
        border: 2px solid rgba(14,196,216,0.25);
        border-radius: 16px;
        padding: 18px;
        max-height: 210px;
        overflow-y: auto;
        color: white;
    }

    .members-scroll::-webkit-scrollbar {
        width: 8px;
    }
    .members-scroll::-webkit-scrollbar-thumb {
        background: var(--teal);
        border-radius: 20px;
    }

    /* Preview Box */
    .preview-box {
        background: rgba(255,255,255,0.08);
        border: 2px solid rgba(14,196,216,0.3);
        border-radius: 20px;
        padding: 20px;
        text-align: center;
    }

    .preview-img {
        border-radius: 16px;
        border: 3px solid var(--teal);
        max-width: 100%;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    /* Botón Guardar */
    .btn-save {
        background: linear-gradient(135deg, var(--teal), #00e0ff);
        color: #000;
        border: none;
        border-radius: 50px;
        padding: 18px 40px;
        font-weight: 700;
        font-size: 1.1rem;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        box-shadow: 0 10px 30px rgba(14,196,216,0.4);
        transition: all 0.4s ease;
        width: 100%;
    }

    .btn-save:hover {
        background: linear-gradient(135deg, #00e0ff, var(--teal));
        transform: translateY(-4px);
        box-shadow: 0 15px 40px rgba(14,196,216,0.6);
    }

    /* Scrollbar bonito para miembros */
    .members-scroll::-webkit-scrollbar-thumb:hover {
        background: #00e0ff;
    }
</style>

<!-- Burbujas flotantes -->
<div class="bubbles">
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
</div>

<div class="page-wrapper">

    <!-- Header -->
    <div class="header-block">
        <p class="header-eyebrow">Configuración</p>
        <h1 class="header-title">Grupo</h1>
        <div class="header-divider">
            <span></span><i></i><span></span>
        </div>
        <p class="header-sub">Personaliza tu agrupación artística</p>
    </div>

    <!-- Formulario -->
    <div class="form-card">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="row g-4">
                <div class="col-lg-7">

                    <div class="mb-4">
                        <label class="form-label">Nombre del grupo</label>
                        {{ form.name }}
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Descripción</label>
                        {{ form.description }}
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Imagen del grupo</label>
                        {{ form.profile_image }}
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Miembros</label>
                        <div class="members-scroll">
                            {{ form.members }}
                        </div>
                    </div>

                </div>

                <!-- Vista Previa -->
                <div class="col-lg-5 text-center">
                    <label class="form-label mb-3">Vista previa</label>
                    
                    <div class="preview-box">
                        {% if grupo.profile_image %}
                            <img id="preview" src="{{ grupo.profile_image.url }}" class="preview-img img-fluid">
                        {% else %}
                            <img id="preview" class="preview-img img-fluid d-none">
                            <div id="no-image" style="height: 260px; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,0.6);">
                                <div class="text-center">
                                    <p style="font-size: 1.1rem; margin-bottom: 15px;">Sin imagen aún</p>
                                    <span style="font-size: 4.8rem;">🖼️</span>
                                </div>
                            </div>
                        {% endif %}
                    </div>
                </div>
            </div>

            <div class="mt-5 pt-3">
                <button type="submit" class="btn-save">
                    💾 Guardar cambios
                </button>
            </div>
        </form>
    </div>

</div>

<script>
    // Preview de imagen
    const fileInput = document.querySelector('input[type="file"]');
    const previewImg = document.getElementById('preview');
    const noImageDiv = document.getElementById('no-image');

    if (fileInput) {
        fileInput.addEventListener('change', function(e) {
            if (e.target.files && e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    previewImg.src = ev.target.result;
                    previewImg.classList.remove('d-none');
                    if (noImageDiv) noImageDiv.style.display = 'none';
                };
                reader.readAsDataURL(e.target.files[0]);
            }
        });
    }
</script>

{% endblock %}
