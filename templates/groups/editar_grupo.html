{% extends 'base.html' %}

{% block content %}

<style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&family=Great+Vibes&family=DM+Sans:wght@300;400;500;600&display=swap');

    :root {
        --blue: #1a8fc4;
        --blue-mid: #3ab4e0;
        --dark: #0d2d45;
        --text: #2e5570;
        --white: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: 'DM Sans', sans-serif;
        background: #eef6fb;
        min-height: 100vh;
        overflow-x: hidden;
        position: relative;
    }

    body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
            radial-gradient(ellipse at 10% 50%, rgba(60,170,220,0.10) 0%, transparent 60%),
            radial-gradient(ellipse at 90% 20%, rgba(60,170,220,0.07) 0%, transparent 50%),
            radial-gradient(ellipse at 50% 100%, rgba(100,200,255,0.08) 0%, transparent 50%);
        z-index: 0;
    }

    .page-wrapper {
        position: relative;
        z-index: 1;
        padding: 80px 30px 100px;
        max-width: 1100px;
        margin: 0 auto;
    }

    .header-block {
        text-align: center;
        margin-bottom: 60px;
    }

    .header-eyebrow {
        font-family: 'Cormorant Garamond', serif;
        font-weight: 600;
        font-size: 0.85rem;
        letter-spacing: 5px;
        text-transform: uppercase;
        color: var(--blue);
        margin-bottom: 12px;
    }

    .header-title {
        font-family: 'Great Vibes', cursive;
        font-size: clamp(2.8rem, 6vw, 4.8rem);
        color: var(--dark);
        line-height: 1;
        margin-bottom: 20px;
    }

    .header-divider {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 18px;
        margin-bottom: 16px;
    }

    .header-divider span {
        display: block;
        height: 1px;
        width: 80px;
        background: linear-gradient(to right, transparent, var(--blue-mid));
    }

    .header-divider i {
        color: var(--blue-mid);
        font-size: 0.9rem;
    }

    .form-card {
        background: #ffffff;
        border: 1px solid #c2dff0;
        border-top: 4px solid var(--blue-mid);
        border-radius: 16px;
        padding: 45px 40px;
        box-shadow: 0 10px 40px rgba(0,80,160,0.10);
    }

    .form-label {
        font-family: 'Cormorant Garamond', serif;
        font-weight: 700;
        color: var(--blue);
        font-size: 0.85rem;
        letter-spacing: 3px;
        text-transform: uppercase;
        margin-bottom: 10px;
        display: block;
    }

    .form-control {
        background: #f4f8ff;
        border: 1.5px solid #c2dff0;
        border-radius: 10px;
        padding: 14px 18px;
        color: var(--dark);
        font-size: 1rem;
        transition: all 0.3s ease;
        width: 100%;
        margin-bottom: 20px;
        font-family: 'DM Sans', sans-serif;
    }

    .form-control:focus {
        border-color: var(--blue-mid);
        outline: none;
        box-shadow: 0 0 0 3px rgba(58,180,224,0.15);
    }

    .preview-box {
        background: #f4f8ff;
        border: 2px solid #c2dff0;
        border-radius: 12px;
        padding: 20px;
        text-align: center;
    }

    .preview-img {
        border-radius: 10px;
        border: 3px solid var(--blue-mid);
        max-width: 100%;
        box-shadow: 0 6px 20px rgba(0,80,160,0.12);
    }

    .btn-save {
        background: var(--dark);
        color: white;
        border: none;
        border-radius: 50px;
        padding: 18px 40px;
        font-weight: 700;
        font-size: 1.05rem;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        box-shadow: 0 6px 20px rgba(0,80,160,0.15);
        transition: all 0.3s ease;
        width: 100%;
        cursor: pointer;
    }

    .btn-save:hover {
        background: var(--blue);
        transform: translateY(-3px);
        box-shadow: 0 12px 30px rgba(26,143,196,0.30);
    }
</style>

<div class="page-wrapper">
    <div class="header-block">
        <p class="header-eyebrow">Configuración</p>
        <h1 class="header-title">Grupo</h1>
        <div class="header-divider">
            <span></span>
            <i class="bi bi-star-fill"></i>
            <span></span>
        </div>
    </div>

    <div class="form-card">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="row g-4">
                <div class="col-lg-7">
                    <div class="mb-4">
                        <label class="form-label">Nombre del grupo</label>
                        {{ form.name }}
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Descripción</label>
                        {{ form.description }}
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Imagen del grupo</label>
                        {{ form.profile_image }}
                    </div>
                </div>

                <div class="col-lg-5 text-center">
                    <label class="form-label mb-3">Vista previa</label>
                    <div class="preview-box">
                        {% if grupo.profile_image %}
                            <img id="preview" src="{{ grupo.profile_image.url }}" class="preview-img img-fluid">
                        {% else %}
                            <img id="preview" class="preview-img img-fluid d-none">
                            <div id="no-image" style="height: 260px; display:flex; align-items:center; justify-content:center; color:#5a7a90;">
                                🖼️ Sin imagen aún
                            </div>
                        {% endif %}
                    </div>
                </div>
            </div>

            <div class="mt-5 pt-3">
                <button type="submit" class="btn-save">💾 Guardar cambios</button>
            </div>
        </form>
    </div>
</div>

<script>
    const fileInput = document.querySelector('input[type="file"]');
    const previewImg = document.getElementById('preview');
    const noImageDiv = document.getElementById('no-image');

    if (fileInput) {
        fileInput.addEventListener('change', function(e) {
            if (e.target.files && e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    previewImg.src = ev.target.result;
                    previewImg.classList.remove('d-none');
                    if (noImageDiv) noImageDiv.style.display = 'none';
                };
                reader.readAsDataURL(e.target.files[0]);
            }
        });
    }
</script>
{% endblock %}
