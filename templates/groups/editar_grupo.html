{% extends 'base.html' %}

{% block content %}

<style>
    /* 🌊 FONDO AZUL CLARO SUAVE Y VIBRANTE */
    .page-background {
        min-height: 100vh;
        padding: 80px 20px 60px;
        background: linear-gradient(135deg, 
            #7be3ff 0%, 
            #5fd9ff 25%, 
            #40ceff 50%, 
            #1ec4ff 75%, 
            #00b8ff 100%);
        
        background-image: 
            radial-gradient(circle at 30% 25%, rgba(255,255,255,0.35) 0%, transparent 60%),
            url("data:image/svg+xml,%3Csvg viewBox='0 0 500 500' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.06'/%3E%3C/svg%3E");
        
        background-size: cover;
        background-attachment: fixed;
        position: relative;
    }

    .page-background::before {
        content: '';
        position: absolute;
        inset: 0;
        background: rgba(0, 120, 160, 0.08);
        pointer-events: none;
    }

    .content-wrapper {
        position: relative;
        z-index: 2;
        max-width: 1100px;
        margin: 0 auto;
    }

    /* 🪐 TARJETA - Azul cielo suave */
    .card-custom {
        border-radius: 32px;
        border: 4px solid #ffffff;
        background: rgba(240, 252, 255, 0.94);
        box-shadow: 0 30px 85px rgba(0, 110, 150, 0.32);
        transition: all 0.4s ease;
        backdrop-filter: blur(12px);
    }

    .card-custom:hover {
        transform: translateY(-10px);
        box-shadow: 0 40px 100px rgba(0, 110, 150, 0.42);
    }

    /* 🖋️ TÍTULO */
    .title-edit {
        font-weight: 900;
        font-size: 3rem;
        color: #ffffff;
        text-transform: uppercase;
        letter-spacing: 4px;
        text-shadow: 4px 4px 0 #0077aa,
                     -3px -3px 0 #0077aa;
        position: relative;
    }

    .title-edit::after {
        content: '';
        position: absolute;
        bottom: -18px;
        left: 50%;
        transform: translateX(-50%);
        width: 110px;
        height: 6px;
        background: linear-gradient(to right, #ffffff, #00d4ff);
        border-radius: 3px;
    }

    /* 🏷️ LABELS */
    .form-label {
        font-weight: 800;
        background: #0077aa;
        color: #fff;
        padding: 8px 20px;
        border-radius: 50px;
        font-size: 0.95rem;
        letter-spacing: 0.6px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    /* ✏️ INPUTS Y TEXTAREA - OVALADOS CON CONTORNO */
    .form-control {
        border: 3px solid #0077aa;
        border-radius: 25px;           /* Mucho más ovalado */
        padding: 15px 20px;
        background: rgba(255, 255, 255, 0.98);
        font-weight: 500;
        transition: all 0.3s ease;
    }

    .form-control:focus {
        border-color: #00d4ff;
        box-shadow: 0 0 0 5px rgba(0, 212, 255, 0.35);
        background: white;
    }

    /* 👥 MIEMBROS - Ovalado */
    .members-scroll {
        border: 3px solid #0077aa;
        border-radius: 25px;
        padding: 18px;
        max-height: 200px;
        overflow-y: auto;
        background: rgba(255, 255, 255, 0.95);
    }

    /* 🖼️ PREVIEW */
    .preview-box {
        border: 4px solid #ffffff;
        border-radius: 28px;
        padding: 18px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 12px 35px rgba(0, 110, 150, 0.3);
    }

    .preview-img {
        border-radius: 20px;
        border: 3px solid #0077aa;
    }

    /* 🚀 BOTÓN */
    .btn-custom {
        background: linear-gradient(135deg, #0077aa, #0099cc);
        color: white;
        border: none;
        border-radius: 50px;
        padding: 18px;
        font-weight: 900;
        letter-spacing: 2px;
        text-transform: uppercase;
        font-size: 1.1rem;
        box-shadow: 0 12px 30px rgba(0, 119, 170, 0.45);
    }

    .btn-custom:hover {
        background: linear-gradient(135deg, #00b8ff, #0077aa);
        transform: translateY(-4px) scale(1.04);
        box-shadow: 0 18px 40px rgba(0, 212, 255, 0.4);
    }

    /* Scrollbar */
    .members-scroll::-webkit-scrollbar {
        width: 9px;
    }
    .members-scroll::-webkit-scrollbar-thumb {
        background: #00a2dd;
        border-radius: 20px;
    }
</style>

<div class="page-background">
    <div class="content-wrapper">
        <div class="text-center mb-5">
            <h2 class="title-edit position-relative">🎨 Configuración de Grupo</h2>
        </div>

        <form method="POST" enctype="multipart/form-data" class="card card-custom p-5">
            {% csrf_token %}

            <div class="row g-4">
                <div class="col-lg-7">

                    <div class="mb-4">
                        <label class="form-label">Nombre</label>
                        {{ form.name }}
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Descripción</label>
                        {{ form.description }}
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Imagen del grupo</label>
                        {{ form.profile_image }}
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Miembros</label>
                        <div class="members-scroll">
                            {{ form.members }}
                        </div>
                    </div>

                </div>

                <div class="col-lg-5 text-center">
                    <label class="form-label mb-3">Vista previa</label>
                    
                    <div class="preview-box">
                        {% if grupo.profile_image %}
                            <img id="preview" src="{{ grupo.profile_image.url }}" class="preview-img img-fluid">
                        {% else %}
                            <img id="preview" class="preview-img img-fluid d-none">
                            <div id="no-image" style="height: 260px; display:flex; align-items:center; justify-content:center; color:#0077aa;">
                                <div class="text-center">
                                    <p class="fw-bold fs-5">Sin imagen aún</p>
                                    <span style="font-size: 4.5rem;">🖼️</span>
                                </div>
                            </div>
                        {% endif %}
                    </div>
                </div>
            </div>

            <div class="mt-5">
                <button type="submit" class="btn btn-custom w-100">
                    💾 Guardar cambios
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    const fileInput = document.querySelector('input[type="file"]');
    const previewImg = document.getElementById('preview');
    const noImageDiv = document.getElementById('no-image');

    if (fileInput) {
        fileInput.addEventListener('change', function(e) {
            if (e.target.files && e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    previewImg.src = ev.target.result;
                    previewImg.classList.remove('d-none');
                    if (noImageDiv) noImageDiv.style.display = 'none';
                };
                reader.readAsDataURL(e.target.files[0]);
            }
        });
    }
</script>

{% endblock %}
