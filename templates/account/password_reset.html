{% extends "base.html" %}

{% block content %}

<style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400;1,700&family=DM+Sans:wght@300;400;500;600&display=swap');

    :root {
        --teal: #0ec4d8;
        --teal-dark: #0a9aaa;
        --white: #ffffff;
    }

    body {
        font-family: 'DM Sans', sans-serif;
        background: #001840;
        min-height: 100vh;
        overflow-x: hidden;
        position: relative;
    }

    /* Fondo animado */
    body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
            radial-gradient(ellipse 70% 55% at 15% 15%, rgba(14,196,216,0.18) 0%, transparent 60%),
            radial-gradient(ellipse 60% 70% at 85% 80%, rgba(0,64,204,0.35) 0%, transparent 60%),
            radial-gradient(ellipse 50% 50% at 50% 50%, rgba(26,107,255,0.10) 0%, transparent 70%),
            linear-gradient(150deg, #001840 0%, #002a6e 35%, #003580 55%, #001d55 100%);
        z-index: -1;
        animation: bgShift 14s ease-in-out infinite alternate;
    }

    @keyframes bgShift {
        0%   { filter: hue-rotate(0deg) brightness(1); }
        50%  { filter: hue-rotate(12deg) brightness(1.06); }
        100% { filter: hue-rotate(-8deg) brightness(0.96); }
    }

    /* Burbujas flotantes */
    .bubbles {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
    }

    .bubble {
        position: absolute;
        bottom: -120px;
        border-radius: 50%;
        animation: floatUp linear infinite;
    }

    .bubble:nth-child(1)  { width: 40px; height: 40px; left: 8%;  animation-duration: 15s; background: rgba(14,196,216,0.09); }
    .bubble:nth-child(2)  { width: 70px; height: 70px; left: 20%; animation-duration: 20s; background: rgba(255,255,255,0.05); }
    .bubble:nth-child(3)  { width: 90px; height: 90px; left: 55%; animation-duration: 23s; background: rgba(26,107,255,0.09); }

    @keyframes floatUp {
        0%   { transform: translateY(0) scale(1);   opacity: 0; }
        15%  { opacity: 0.9; }
        100% { transform: translateY(-115vh) scale(1.2); opacity: 0; }
    }

    /* Contenedor principal */
    .reset-wrapper {
        position: relative;
        z-index: 2;
        min-height: 85vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
    }

    /* Card */
    .reset-card {
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(14,196,216,0.3);
        border-top: 5px solid var(--teal);
        border-radius: 28px;
        padding: 55px 50px;
        max-width: 500px; /* Un poco más ancho para el input grande */
        width: 100%;
        text-align: center;
        backdrop-filter: blur(18px);
        box-shadow: 0 30px 80px rgba(0, 0, 40, 0.6);
    }

    .reset-icon {
        font-size: 4.5rem;
        margin-bottom: 25px;
    }

    .reset-title {
        font-family: 'Playfair Display', serif;
        font-size: 2.5rem;
        font-weight: 700;
        color: var(--white);
        margin-bottom: 18px;
        letter-spacing: -1px;
    }

    .reset-subtitle {
        color: rgba(255,255,255,0.75);
        font-size: 1.08rem;
        line-height: 1.7;
        margin-bottom: 35px;
    }

    /* 🎯 INPUT CORREO: FUERZA EL TAMAÑO AQUÍ */
    form input[type="email"], 
    form input[type="text"],
    .form-control {
        display: block;
        width: 100% !important;
        height: 70px !important;            /* Altura generosa */
        background: rgba(255,255,255,0.09) !important;
        border: 2px solid rgba(14,196,216,0.4) !important;
        border-radius: 18px !important;
        padding: 0 25px !important;          /* Espacio interno lateral */
        color: white !important;
        font-size: 1.25rem !important;       /* Texto grande y legible */
        margin-bottom: 25px !important;
        transition: all 0.3s ease;
        box-sizing: border-box;
    }

    form input:focus {
        border-color: var(--teal) !important;
        box-shadow: 0 0 0 5px rgba(14,196,216,0.25) !important;
        background: rgba(255,255,255,0.15) !important;
        outline: none;
    }

    /* Botón - Ajustado para que combine con el input */
    .btn-reset {
        background: linear-gradient(135deg, var(--teal), #00e0ff);
        color: #000;
        border: none;
        border-radius: 18px;                 /* Mismo radio que el input */
        padding: 0 40px;
        font-weight: 700;
        font-size: 1.15rem;
        letter-spacing: 1px;
        width: 100%;
        height: 70px;                        /* Misma altura exacta que el input */
        transition: all 0.4s ease;
        cursor: pointer;
    }

    .btn-reset:hover {
        transform: translateY(-4px);
        box-shadow: 0 15px 40px rgba(14,196,216,0.5);
    }

    .btn-cancel {
        display: inline-block;
        margin-top: 30px;
        color: rgba(255,255,255,0.7);
        text-decoration: none;
        font-weight: 500;
    }

    .btn-cancel:hover { color: var(--teal); }
</style>

<div class="bubbles">
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
</div>

<div class="reset-wrapper">
    <div class="reset-card">
        <div class="reset-icon">🔑</div>
        
        <h2 class="reset-title">Recuperar contraseña</h2>
        
        <p class="reset-subtitle">
            Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña.
        </p>

        <form method="post">
            {% csrf_token %}
            
            {# Django renderiza el input aquí #}
            {{ form.email }}

            <button type="submit" class="btn-reset">
                Enviar enlace de recuperación
            </button>
        </form>

        <a href="{% url 'account_login' %}" class="btn-cancel">
            ← Volver al inicio de sesión
        </a>
    </div>
</div>

{% endblock %}
