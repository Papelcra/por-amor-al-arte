{% extends 'base.html' %}

{% block content %}

<style>
    /* 🌊 FONDO AZUL CLARO SUAVE - Igual que en las otras páginas */
    .page-background {
        min-height: 100vh;
        padding: 100px 20px 80px;
        background: linear-gradient(135deg, 
            #7be3ff 0%, 
            #5fd9ff 25%, 
            #40ceff 50%, 
            #1ec4ff 75%, 
            #00b8ff 100%);
        
        background-image: 
            radial-gradient(circle at 30% 25%, rgba(255,255,255,0.35) 0%, transparent 60%),
            url("data:image/svg+xml,%3Csvg viewBox='0 0 500 500' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.06'/%3E%3C/svg%3E");
        
        background-size: cover;
        background-attachment: fixed;
        position: relative;
    }

    .page-background::before {
        content: '';
        position: absolute;
        inset: 0;
        background: rgba(0, 120, 160, 0.08);
        pointer-events: none;
    }

    .content-wrapper {
        position: relative;
        z-index: 2;
        max-width: 900px;
        margin: 0 auto;
    }

    /* 🖋️ TÍTULO PRINCIPAL */
    .welcome-title {
        font-weight: 900;
        font-size: 3.2rem;
        color: #ffffff;
        text-transform: uppercase;
        letter-spacing: 3px;
        text-shadow: 4px 4px 0 #0077aa,
                     -3px -3px 0 #0077aa;
        margin-bottom: 8px;
    }

    .welcome-subtitle {
        font-size: 1.35rem;
        color: rgba(255, 255, 255, 0.95);
        font-weight: 500;
        text-shadow: 1px 1px 3px rgba(0, 119, 170, 0.6);
    }

    /* 🪐 TARJETAS / BOTONES */
    .action-card {
        border-radius: 28px;
        border: 4px solid #ffffff;
        background: rgba(240, 252, 255, 0.94);
        box-shadow: 0 25px 70px rgba(0, 110, 150, 0.35);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        color: inherit;
        padding: 28px 20px;
        font-size: 1.35rem;
        font-weight: 800;
        letter-spacing: 1px;
        text-align: center;
    }

    .action-card:hover {
        transform: translateY(-12px);
        box-shadow: 0 40px 95px rgba(0, 110, 150, 0.45);
    }

    /* Colores específicos por botón */
    .btn-artistas {
        background: linear-gradient(135deg, #0077aa, #0099cc);
        color: white;
        border: none;
    }

    .btn-artistas:hover {
        background: linear-gradient(135deg, #00b8ff, #0077aa);
        color: white;
    }

    .btn-mi-perfil {
        background: linear-gradient(135deg, #00a36c, #00c48a);
        color: white;
        border: none;
    }

    .btn-mi-perfil:hover {
        background: linear-gradient(135deg, #00d4a3, #00a36c);
        color: white;
    }

    .btn-crear-perfil {
        background: linear-gradient(135deg, #f59e0b, #fbbf24);
        color: #1e3a4f;
        border: none;
        font-weight: 900;
    }

    .btn-crear-perfil:hover {
        background: linear-gradient(135deg, #fbbf24, #f59e0b);
        color: #1e3a4f;
    }

    .btn-logout {
        background: linear-gradient(135deg, #dc2626, #ef4444);
        color: white;
        border: none;
    }

    .btn-logout:hover {
        background: linear-gradient(135deg, #ef4444, #b91c1c);
        color: white;
    }
</style>

<div class="page-background">
    <div class="content-wrapper">
        <div class="text-center mb-5">
            <h1 class="welcome-title">🎨 Bienvenido artista</h1>
            <p class="welcome-subtitle">Gestiona tu perfil y explora talento</p>
        </div>

        <div class="row g-4">

            <!-- Ver artistas -->
            <div class="col-md-4">
                <a href="{% url 'artists:lista' %}" class="action-card btn-artistas">
                    🎭 Ver artistas
                </a>
            </div>

            <!-- Mi perfil o Crear perfil -->
            <div class="col-md-4">
                {% if request.user.artist %}
                    <a href="{% url 'artists:ver' request.user.artist.id %}" 
                       class="action-card btn-mi-perfil">
                        👤 Mi perfil
                    </a>
                {% else %}
                    <a href="{% url 'artists:perfil' %}" 
                       class="action-card btn-crear-perfil">
                        ✏️ Crear mi perfil
                    </a>
                {% endif %}
            </div>

            <!-- Cerrar sesión -->
            <div class="col-md-4">
                <a href="{% url 'account_logout' %}" 
                   class="action-card btn-logout">
                    🚪 Cerrar sesión
                </a>
            </div>

        </div>
    </div>
</div>

{% endblock %}
