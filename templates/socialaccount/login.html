{% extends "base.html" %}
{% load socialaccount %}

{% block content %}

<style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400;1,700&family=DM+Sans:wght@300;400;500;600&display=swap');

    :root {
        --teal: #0ec4d8;
        --teal-dark: #0a9aaa;
        --white: #ffffff;
    }

    body {
        font-family: 'DM Sans', sans-serif;
        background: #001840;
        min-height: 100vh;
        overflow-x: hidden;
        position: relative;
    }

    /* Fondo animado */
    body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
            radial-gradient(ellipse 70% 55% at 15% 15%, rgba(14,196,216,0.18) 0%, transparent 60%),
            radial-gradient(ellipse 60% 70% at 85% 80%, rgba(0,64,204,0.35) 0%, transparent 60%),
            radial-gradient(ellipse 50% 50% at 50% 50%, rgba(26,107,255,0.10) 0%, transparent 70%),
            linear-gradient(150deg, #001840 0%, #002a6e 35%, #003580 55%, #001d55 100%);
        z-index: -1;
        animation: bgShift 14s ease-in-out infinite alternate;
    }

    @keyframes bgShift {
        0%   { filter: hue-rotate(0deg) brightness(1); }
        50%  { filter: hue-rotate(12deg) brightness(1.06); }
        100% { filter: hue-rotate(-8deg) brightness(0.96); }
    }

    /* Burbujas flotantes */
    .bubbles {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
    }

    .bubble {
        position: absolute;
        bottom: -120px;
        border-radius: 50%;
        animation: floatUp linear infinite;
    }

    .bubble:nth-child(1)  { width: 40px; height: 40px; left: 8%;  animation-duration: 15s; animation-delay: 0s;   background: rgba(14,196,216,0.09); }
    .bubble:nth-child(2)  { width: 70px; height: 70px; left: 20%; animation-duration: 20s; animation-delay: 3s;   background: rgba(255,255,255,0.05); }
    .bubble:nth-child(3)  { width: 28px; height: 28px; left: 35%; animation-duration: 11s; animation-delay: 1s;   background: rgba(14,196,216,0.07); }
    .bubble:nth-child(4)  { width: 90px; height: 90px; left: 55%; animation-duration: 23s; animation-delay: 5s;   background: rgba(26,107,255,0.09); }
    .bubble:nth-child(5)  { width: 35px; height: 35px; left: 72%; animation-duration: 14s; animation-delay: 2s;   background: rgba(14,196,216,0.06); }
    .bubble:nth-child(6)  { width: 60px; height: 60px; left: 82%; animation-duration: 18s; animation-delay: 7s;   background: rgba(255,255,255,0.04); }

    @keyframes floatUp {
        0%   { transform: translateY(0) scale(1);   opacity: 0; }
        15%  { opacity: 0.9; }
        85%  { opacity: 0.6; }
        100% { transform: translateY(-115vh) scale(1.2); opacity: 0; }
    }

    /* Contenedor principal */
    .login-wrapper {
        position: relative;
        z-index: 2;
        min-height: 85vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
    }

    /* Card de Login con Google */
    .google-card {
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(14,196,216,0.3);
        border-top: 5px solid var(--teal);
        border-radius: 28px;
        padding: 60px 50px;
        max-width: 480px;
        width: 100%;
        text-align: center;
        backdrop-filter: blur(18px);
        box-shadow: 0 30px 80px rgba(0, 0, 40, 0.6);
    }

    .google-icon {
        font-size: 4.8rem;
        margin-bottom: 25px;
    }

    .google-title {
        font-family: 'Playfair Display', serif;
        font-size: 2.5rem;
        font-weight: 700;
        color: var(--white);
        margin-bottom: 15px;
        letter-spacing: -1px;
    }

    .google-subtitle {
        color: rgba(255,255,255,0.75);
        font-size: 1.1rem;
        line-height: 1.7;
        margin-bottom: 40px;
    }

    /* Botón Google */
    .btn-google {
        background: #ffffff;
        color: #000;
        border: none;
        border-radius: 50px;
        padding: 16px 40px;
        font-weight: 700;
        font-size: 1.15rem;
        letter-spacing: 0.8px;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        transition: all 0.4s ease;
        box-shadow: 0 10px 30px rgba(255,255,255,0.2);
    }

    .btn-google:hover {
        background: #f1f1f1;
        transform: translateY(-4px);
        box-shadow: 0 15px 40px rgba(255,255,255,0.3);
    }

    .google-logo {
        font-size: 1.6rem;
    }

    .btn-cancel {
        margin-top: 25px;
        color: rgba(255,255,255,0.7);
        text-decoration: none;
        font-weight: 500;
    }

    .btn-cancel:hover {
        color: var(--teal);
    }
</style>

<!-- Burbujas flotantes -->
<div class="bubbles">
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
</div>

<div class="login-wrapper">
    <div class="google-card">
        <div class="google-icon">🔑</div>
        
        <h2 class="google-title">Iniciar sesión</h2>
        <p class="google-subtitle">
            Conecta tu cuenta de Google para acceder a la comunidad artística
        </p>

        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn-google">
                <span class="google-logo">G</span>
                Continuar con Google
            </button>
        </form>

        <a href="/" class="btn-cancel">
            ← Volver al inicio
        </a>
    </div>
</div>

{% endblock %}
