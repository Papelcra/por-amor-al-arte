{% extends 'base.html' %}

{% block content %}

<div class="container my-5">
    <div class="card mx-auto shadow-lg" style="max-width: 600px; border-radius: 15px; overflow: hidden; background: #f8f0ff;">

        {% if artista.profile_image %}
            <img src="{{ artista.profile_image.url }}" class="card-img-top" style="object-fit: cover; height: 300px;">
        {% else %}
            <div style="height: 300px; background: #d8c4ff; display: flex; align-items: center; justify-content: center;">
                <span style="color: #fff; font-weight: bold;">Sin imagen</span>
            </div>
        {% endif %}

        <div class="card-body text-center px-4 py-4">
            <h2 class="fw-bold mb-3" style="color: #6b3fa0;">{{ artista.stage_name }}</h2>
            <p class="text-muted mb-4">{{ artista.description }}</p>

            <h5 class="mb-3" style="color: #6b3fa0;">Géneros:</h5>
            <div>
                {% for genero in artista.genres.all %}
                    <span class="badge rounded-pill me-1 mb-1" style="background-color: #d8b4ff; color: #4a0c7a;">{{ genero.nombre }}</span>
                {% endfor %}
            </div>
        </div>
    </div>
</div>

{% endblock %}
