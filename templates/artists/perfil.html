{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');

    :root {
        --blue: #1a8fc4;
        --blue-dark: #0d2d45;
        --blue-mid: #3ab4e0;
        --white: #ffffff;
        --black: #0a0a0a;
    }

    body {
        font-family: 'DM Sans', sans-serif;
        background: #eef6fb;
        min-height: 100vh;
        overflow-x: hidden;
        position: relative;
    }

    body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
            radial-gradient(ellipse at 10% 50%, rgba(60,170,220,0.10) 0%, transparent 60%),
            radial-gradient(ellipse at 90% 20%, rgba(60,170,220,0.07) 0%, transparent 50%),
            radial-gradient(ellipse at 50% 100%, rgba(100,200,255,0.08) 0%, transparent 50%);
        z-index: 0;
    }

    .page-wrapper {
        position: relative;
        z-index: 1;
        padding: 60px 20px 80px;
    }

    .artist-card {
        max-width: 660px;
        margin: 0 auto;
        background: #ffffff;
        border-radius: 22px;
        overflow: hidden;
        box-shadow: 0 10px 40px rgba(0,80,160,0.12);
        border: 2px solid #c2dff0;
    }

    .image-top {
        height: 240px;
        background: url('https://images.unsplash.com/photo-1511379938547-c1f69419868d') center/cover;
        position: relative;
    }

    .overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(13,45,69,0.45), rgba(13,45,69,0.80));
        color: white;
        display: flex;
        align-items: flex-end;
        padding: 30px;
    }

    .overlay h2 {
        font-family: 'Syne', sans-serif;
        font-weight: 800;
        font-size: 1.9rem;
        text-shadow: 0 3px 15px rgba(0,0,0,0.5);
    }

    .card-body { padding: 40px 44px; }

    label {
        display: block;
        font-weight: 600;
        color: var(--black);
        margin-bottom: 8px;
    }

    .mb-field { margin-bottom: 24px; }

    input[type="text"], textarea, select {
        width: 100%;
        padding: 14px;
        border: 1.5px solid #c2dff0;
        border-radius: 12px;
        background: #f4f8ff;
        color: #0d2d45;
    }

    .btn-main {
        width: 100%;
        padding: 16px;
        background: var(--blue-dark);
        color: white;
        border: none;
        border-radius: 12px;
        font-weight: 700;
        margin-top: 30px;
    }
</style>

<div class="page-wrapper">
    <div class="artist-card">
        <div class="image-top">
            <div class="overlay">
                <h2>Edita tu perfil artístico</h2>
            </div>
        </div>

        <div class="card-body">
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="mb-field">
                    <label>Nombre artístico</label>
                    <input type="text" name="stage_name" value="{{ artist.stage_name }}">
                </div>

                <div class="mb-field">
                    <label>Descripción</label>
                    <textarea name="description">{{ artist.description }}</textarea>
                </div>

                <div class="mb-field">
                    <label>Grupo</label>
                    <select name="group">
                        <option value="">Sin grupo</option>
                        {% for grupo in grupos %}
                            <option value="{{ grupo.id }}"
                                {% if artist.group and artist.group.id == grupo.id %}selected{% endif %}>
                                {{ grupo.name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-field">
                    <label>Línea artística</label>
                    <select name="linea" id="linea-select">
                        <option value="">Selecciona</option>
                        {% for linea in lineas %}
                            <option value="{{ linea.id }}"
                                {% if artist.linea and artist.linea.id == linea.id %}selected{% endif %}>
                                {{ linea.nombre }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- 🔥 CONTENEDOR GENEROS CORREGIDO -->
                <div id="genres-container"
                     data-generos="{% for g in artist.genres.all %}{{ g.id }}{% if not forloop.last %},{% endif %}{% endfor %}">
                </div>

                <button type="submit" class="btn-main">Guardar</button>
            </form>
        </div>
    </div>
</div>

<script>
    const lineaSelect = document.getElementById('linea-select');
    const genresContainer = document.getElementById('genres-container');

    const generosActuales = genresContainer.dataset.generos
        ? genresContainer.dataset.generos.split(',').map(Number)
        : [];

    function loadGenres(lineaId) {
        if (!lineaId) {
            genresContainer.innerHTML = '';
            return;
        }

        fetch(`/catalog/generos/${lineaId}/`)
            .then(r => r.json())
            .then(data => {
                genresContainer.innerHTML = '';

                data.forEach(g => {
                    const wrapper = document.createElement('div');

                    const input = document.createElement('input');
                    input.type = 'checkbox';
                    input.name = 'genres';
                    input.value = g.id;

                    if (generosActuales.includes(g.id)) {
                        input.checked = true;
                    }

                    const label = document.createElement('label');
                    label.textContent = g.nombre;

                    wrapper.appendChild(input);
                    wrapper.appendChild(label);

                    genresContainer.appendChild(wrapper);
                });
            });
    }

    if (lineaSelect.value) {
        loadGenres(lineaSelect.value);
    }

    lineaSelect.addEventListener('change', function () {
        loadGenres(this.value);
    });
</script>

{% endblock %}
