{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');

    :root {
        --blue: #1a6bff;
        --blue-dark: #0040cc;
        --blue-mid: #2979ff;
        --white: #ffffff;
        --black: #0a0a0a;
    }

    body {
        font-family: 'DM Sans', sans-serif;
        background: var(--blue-dark);
        min-height: 100vh;
        overflow-x: hidden;
        position: relative;
    }

    /* Fondo animado */
    body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
            radial-gradient(ellipse 80% 60% at 20% 10%, #1a6bff55 0%, transparent 60%),
            radial-gradient(ellipse 60% 80% at 80% 80%, #0040cc88 0%, transparent 60%),
            radial-gradient(ellipse 50% 50% at 50% 50%, #2979ff22 0%, transparent 70%),
            linear-gradient(135deg, #001a66 0%, #0040cc 40%, #1a6bff 70%, #003399 100%);
        z-index: -1;
        animation: bgShift 12s ease-in-out infinite alternate;
    }

    @keyframes bgShift {
        0%   { filter: hue-rotate(0deg) brightness(1); }
        50%  { filter: hue-rotate(15deg) brightness(1.08); }
        100% { filter: hue-rotate(-10deg) brightness(0.95); }
    }

    /* Burbujas */
    .bubbles {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
    }

    .bubble {
        position: absolute;
        bottom: -120px;
        border-radius: 50%;
        background: rgba(255,255,255,0.06);
        animation: floatUp linear infinite;
    }

    .bubble:nth-child(1)  { width: 40px; height: 40px; left: 8%; animation-duration: 14s; }
    .bubble:nth-child(2)  { width: 70px; height: 70px; left: 18%; animation-duration: 18s; animation-delay: 3s; background: rgba(255,255,255,0.04); }
    .bubble:nth-child(3)  { width: 25px; height: 25px; left: 32%; animation-duration: 11s; animation-delay: 1s; }
    .bubble:nth-child(4)  { width: 90px; height: 90px; left: 48%; animation-duration: 22s; animation-delay: 5s; background: rgba(26,107,255,0.15); }
    .bubble:nth-child(5)  { width: 35px; height: 35px; left: 62%; animation-duration: 13s; animation-delay: 2s; }
    .bubble:nth-child(6)  { width: 55px; height: 55px; left: 74%; animation-duration: 17s; animation-delay: 7s; background: rgba(255,255,255,0.03); }
    .bubble:nth-child(7)  { width: 20px; height: 20px; left: 85%; animation-duration: 10s; animation-delay: 4s; }
    .bubble:nth-child(8)  { width: 60px; height: 60px; left: 92%; animation-duration: 20s; animation-delay: 0s; background: rgba(26,107,255,0.1); }

    @keyframes floatUp {
        0%   { transform: translateY(0) scale(1); opacity: 0; }
        10%  { opacity: 1; }
        90%  { opacity: 0.6; }
        100% { transform: translateY(-110vh) scale(1.2); opacity: 0; }
    }

    .page-wrapper {
        position: relative;
        z-index: 1;
        padding: 60px 20px 80px;
    }

    .artist-card {
        max-width: 660px;
        margin: 0 auto;
        background: rgba(255,255,255,0.97);
        border-radius: 22px;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(0,0,60,0.45);
        border: 2px solid rgba(255,255,255,0.15);
    }

    .image-top {
        height: 240px;
        background: url('https://images.unsplash.com/photo-1511379938547-c1f69419868d') center/cover;
        position: relative;
    }

    .overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(0,40,180,0.45), rgba(0,20,120,0.8));
        color: white;
        display: flex;
        align-items: flex-end;
        padding: 30px;
    }

    .overlay h2 {
        font-family: 'Syne', sans-serif;
        font-weight: 800;
        font-size: 1.9rem;
        text-shadow: 0 3px 15px rgba(0,0,0,0.5);
    }

    .card-body {
        padding: 40px 44px;
    }

    label {
        display: block;
        font-weight: 600;
        color: var(--black);
        margin-bottom: 8px;
    }

    .mb-field {
        margin-bottom: 24px;
    }

    input[type="text"], textarea, select {
        width: 100%;
        padding: 14px;
        border: 1.5px solid #c7d9ff;
        border-radius: 12px;
        background: #f4f8ff;
        font-family: inherit;
    }

    .image-preview-wrap {
        text-align: center;
        margin-bottom: 20px;
    }

    .image-preview img {
        width: 130px;
        height: 130px;
        border-radius: 50%;
        object-fit: cover;
        border: 4px solid var(--blue);
        box-shadow: 0 6px 20px rgba(26,107,255,0.3);
    }

    /* Contenedor de géneros dinámicos */
    .genres-container {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 8px;
    }

    .genres-container input[type="checkbox"] {
        display: none;
    }

    .genres-container label {
        background: #dce9ff;
        color: var(--blue-dark);
        padding: 9px 18px;
        border-radius: 30px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        transition: all 0.2s;
        margin-bottom: 0;
    }

    .genres-container label:hover {
        background: #b8d0ff;
        transform: scale(1.05);
    }

    .genres-container input:checked + label {
        background: var(--blue);
        color: white;
    }

    .btn-main {
        width: 100%;
        padding: 16px;
        background: var(--black);
        color: white;
        border: none;
        border-radius: 12px;
        font-weight: 700;
        font-size: 1.1rem;
        margin-top: 30px;
        cursor: pointer;
        transition: background 0.3s;
    }

    .btn-main:hover {
        background: var(--blue);
    }
</style>

<div class="bubbles">
    <div class="bubble"></div><div class="bubble"></div>
    <div class="bubble"></div><div class="bubble"></div>
    <div class="bubble"></div><div class="bubble"></div>
    <div class="bubble"></div><div class="bubble"></div>
</div>

<div class="page-wrapper">
    <div class="artist-card">
        <div class="image-top">
            <div class="overlay">
                <h2>Edita tu perfil artístico</h2>
            </div>
        </div>

        <div class="card-body">
            <form method="POST" enctype="multipart/form-data" id="profile-form">
                {% csrf_token %}

                <div class="mb-field">
                    <label for="id_stage_name">Nombre artístico</label>
                    <input type="text" name="stage_name" id="id_stage_name" 
                           value="{{ artist.stage_name|default:'' }}" placeholder="Ej: Rayo Azul">
                </div>

                <div class="mb-field">
                    <label for="id_description">Descripción</label>
                    <textarea name="description" id="id_description" rows="4" 
                              placeholder="Cuéntanos sobre tu arte...">{{ artist.description|default:'' }}</textarea>
                </div>

                <div class="mb-field">
                    <label>Imagen de perfil</label>
                    <div class="image-preview-wrap">
                        <div class="image-preview">
                            {% if artist.profile_image %}
                                <img id="preview" src="{{ artist.profile_image.url }}">
                            {% else %}
                                <img id="preview" src="https://via.placeholder.com/130" alt="Preview">
                            {% endif %}
                        </div>
                    </div>
                    <input type="file" name="profile_image" id="id_profile_image" accept="image/*" 
                           style="border: 1.5px dashed #93b8ff; width: 100%; padding: 12px; border-radius: 12px;">
                </div>

                <div class="mb-field">
                    <label for="linea-select">Línea artística</label>
                    <select name="linea" id="linea-select">
                        <option value="">Selecciona una línea</option>
                        {% for linea in lineas %}
                            <option value="{{ linea.id }}" 
                                {% if artist.linea and artist.linea.id == linea.id %}selected{% endif %}>
                                {{ linea.nombre }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-field">
                    <label for="group-select">Grupo</label>
                    <select name="group" id="group-select">
                        <option value="">Sin grupo</option>
                        {% for grupo in grupos %}
                            <option value="{{ grupo.id }}"
                                {% if artist.group and artist.group.id == grupo.id %}selected{% endif %}>
                                {{ grupo.name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-field">
                    <label>Géneros asociados (máximo 3)</label>
                    <div id="genres-container" class="genres-container">
                        </div>
                    <small id="genre-warning" style="color: #dc2626; display: none; margin-top: 10px; font-weight: 600;">
                        ⚠️ Solo puedes seleccionar hasta 3 géneros
                    </small>
                </div>

                <button type="submit" class="btn-main">💾 Guardar cambios</button>
            </form>
        </div>
    </div>
</div>

<script>
    // 1. Preview de imagen
    const fileInput = document.getElementById('id_profile_image');
    const previewImg = document.getElementById('preview');

    if (fileInput) {
        fileInput.addEventListener('change', function(e) {
            if (e.target.files[0]) {
                previewImg.src = URL.createObjectURL(e.target.files[0]);
            }
        });
    }

    // 2. Géneros dinámicos
    const lineaSelect = document.getElementById('linea-select');
    const genresContainer = document.getElementById('genres-container');
    const warning = document.getElementById('genre-warning');

    function loadGenres(lineaId) {
        if (!lineaId) {
            genresContainer.innerHTML = '<p style="color: #666; font-size: 0.9rem;">Selecciona una línea para ver los géneros.</p>';
            return;
        }

        fetch(`/catalog/generos/${lineaId}/`)
            .then(res => res.json())
            .then(data => {
                genresContainer.innerHTML = '';
                const generosActuales = [{% for g in artist.genres.all %}{{ g.id }},{% endfor %}];

                data.forEach(g => {
                    const input = document.createElement('input');
                    input.type = 'checkbox';
                    input.name = 'genres';
                    input.value = g.id;
                    input.id = 'g_' + g.id;
                    if (generosActuales.includes(g.id)) input.checked = true;

                    const label = document.createElement('label');
                    label.htmlFor = input.id;
                    label.textContent = g.nombre;

                    input.addEventListener('change', () => {
                        const checkedCount = genresContainer.querySelectorAll('input:checked').length;
                        if (checkedCount > 3) {
                            input.checked = false;
                            warning.style.display = 'block';
                        } else {
                            warning.style.display = 'none';
                        }
                    });

                    genresContainer.appendChild(input);
                    genresContainer.appendChild(label);
                });
            })
            .catch(err => console.error("Error:", err));
    }

    lineaSelect.addEventListener('change', function() { loadGenres(this.value); });
    if (lineaSelect.value) { loadGenres(lineaSelect.value); }
</script>
{% endblock %}
