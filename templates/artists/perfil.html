{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');

    :root {
        --blue: #1a8fc4;
        --blue-dark: #0d2d45;
        --blue-mid: #3ab4e0;
        --white: #ffffff;
        --black: #0a0a0a;
    }

    body {
        font-family: 'DM Sans', sans-serif;
        background: #eef6fb;
        min-height: 100vh;
        overflow-x: hidden;
        position: relative;
    }

    body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
            radial-gradient(ellipse at 10% 50%, rgba(60,170,220,0.10) 0%, transparent 60%),
            radial-gradient(ellipse at 90% 20%, rgba(60,170,220,0.07) 0%, transparent 50%),
            radial-gradient(ellipse at 50% 100%, rgba(100,200,255,0.08) 0%, transparent 50%);
        z-index: 0;
    }

    .page-wrapper {
        position: relative;
        z-index: 1;
        padding: 60px 20px 80px;
    }

    .artist-card {
        max-width: 660px;
        margin: 0 auto;
        background: #ffffff;
        border-radius: 22px;
        overflow: hidden;
        box-shadow: 0 10px 40px rgba(0,80,160,0.12);
        border: 2px solid #c2dff0;
    }

    .image-top {
        height: 240px;
        background: url('https://images.unsplash.com/photo-1511379938547-c1f69419868d') center/cover;
        position: relative;
    }

    .overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(13,45,69,0.45), rgba(13,45,69,0.80));
        color: white;
        display: flex;
        align-items: flex-end;
        padding: 30px;
    }

    .overlay h2 {
        font-family: 'Syne', sans-serif;
        font-weight: 800;
        font-size: 1.9rem;
        text-shadow: 0 3px 15px rgba(0,0,0,0.5);
    }

    .card-body {
        padding: 40px 44px;
    }

    label {
        display: block;
        font-weight: 600;
        color: var(--black);
        margin-bottom: 8px;
    }

    .mb-field {
        margin-bottom: 24px;
    }

    input[type="text"], textarea, select {
        width: 100%;
        padding: 14px;
        border: 1.5px solid #c2dff0;
        border-radius: 12px;
        background: #f4f8ff;
        font-family: inherit;
        color: #0d2d45;
    }

    input[type="text"]:focus, textarea:focus, select:focus {
        border-color: var(--blue-mid);
        outline: none;
        box-shadow: 0 0 0 3px rgba(58,180,224,0.15);
    }

    .image-preview-wrap {
        text-align: center;
        margin-bottom: 20px;
    }

    .image-preview img {
        width: 130px;
        height: 130px;
        border-radius: 50%;
        object-fit: cover;
        border: 4px solid var(--blue);
        box-shadow: 0 6px 20px rgba(26,143,196,0.25);
    }

    .genres-container {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 8px;
    }

    .genres-container input[type="checkbox"] {
        display: none;
    }

    .genres-container label {
        background: #dce9ff;
        color: var(--blue-dark);
        padding: 9px 18px;
        border-radius: 30px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        transition: all 0.2s;
        margin-bottom: 0;
    }

    .genres-container label:hover {
        background: #b8d0ff;
        transform: scale(1.05);
    }

    .genres-container input:checked + label {
        background: var(--blue);
        color: white;
    }

    .btn-main {
        width: 100%;
        padding: 16px;
        background: var(--blue-dark);
        color: white;
        border: none;
        border-radius: 12px;
        font-weight: 700;
        font-size: 1.1rem;
        margin-top: 30px;
        cursor: pointer;
        transition: background 0.3s;
    }

    .btn-main:hover {
        background: var(--blue);
    }
</style>

<div class="page-wrapper">
    <div class="artist-card">
        <div class="image-top">
            <div class="overlay">
                <h2>Edita tu perfil artístico</h2>
            </div>
        </div>

        <div class="card-body">
            <form method="POST" enctype="multipart/form-data" id="profile-form">
                {% csrf_token %}

                <div class="mb-field">
                    <label for="id_stage_name">Nombre artístico</label>
                    <input type="text" name="stage_name" id="id_stage_name"
                           value="{{ artist.stage_name|default:'' }}" placeholder="Ej: Rayo Azul">
                </div>

                <div class="mb-field">
                    <label for="id_description">Descripción</label>
                    <textarea name="description" id="id_description" rows="4"
                              placeholder="Cuéntanos sobre tu arte...">{{ artist.description|default:'' }}</textarea>
                </div>

                <div class="mb-field">
                    <label>Imagen de perfil</label>
                    <div class="image-preview-wrap">
                        <div class="image-preview">
                            {% if artist.profile_image %}
                                <img id="preview" src="{{ artist.profile_image.url }}">
                            {% else %}
                                <img id="preview" src="https://via.placeholder.com/130" alt="Preview">
                            {% endif %}
                        </div>
                    </div>
                    <input type="file" name="profile_image" id="id_profile_image" accept="image/*"
                           style="border: 1.5px dashed #93b8ff; width: 100%; padding: 12px; border-radius: 12px;">
                </div>

                <div class="mb-field">
                    <label for="linea-select">Línea artística</label>
                    <select name="linea" id="linea-select">
                        <option value="">Selecciona una línea</option>
                        {% for linea in lineas %}
                            <option value="{{ linea.id }}"
                                {% if artist.linea and artist.linea.id == linea.id %}selected{% endif %}>
                                {{ linea.nombre }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-field">
                    <label for="group-select">Grupo</label>
                    <select name="group" id="group-select">
                        <option value="">Sin grupo</option>
                        {% for grupo in grupos %}
                            <option value="{{ grupo.id }}"
                                {% if artist.group and artist.group.id == grupo.id %}selected{% endif %}>
                                {{ grupo.name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-field">
                    <label>Géneros asociados (máximo 3)</label>
                    <div id="genres-container"
                         class="genres-container"
                         data-generos="{% for g in artist.genres.all %}{{ g.id }}{% if not forloop.last %},{% endif %}{% endfor %}">
                    </div>
                    <small id="genre-warning" style="color: #dc2626; display: none; margin-top: 10px; font-weight: 600;">
                        ⚠️ Solo puedes seleccionar hasta 3 géneros
                    </small>
                </div>

                <button type="submit" class="btn-main">💾 Guardar cambios</button>
            </form>
        </div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('id_profile_image');
    const previewImg = document.getElementById('preview');

    if (fileInput) {
        fileInput.addEventListener('change', function(e) {
            if (e.target.files[0]) {
                previewImg.src = URL.createObjectURL(e.target.files[0]);
            }
        });
    }

    const lineaSelect = document.getElementById('linea-select');
    const genresContainer = document.getElementById('genres-container');
    const warning = document.getElementById('genre-warning');

    const generosActuales = genresContainer.dataset.generos
        ? genresContainer.dataset.generos.split(',').map(Number)
        : [];

    function loadGenres(lineaId) {
        if (!lineaId) {
            genresContainer.innerHTML = '<p style="color: #666; font-size: 0.9rem;">Selecciona una línea para ver los géneros.</p>';
            return;
        }

        fetch(`/catalog/generos/${lineaId}/`)
            .then(res => res.json())
            .then(data => {
                genresContainer.innerHTML = '';

                data.forEach(g => {
                    const input = document.createElement('input');
                    input.type = 'checkbox';
                    input.name = 'genres';
                    input.value = g.id;
                    input.id = 'g_' + g.id;
                    if (generosActuales.includes(g.id)) input.checked = true;

                    const label = document.createElement('label');
                    label.htmlFor = input.id;
                    label.textContent = g.nombre;

                    input.addEventListener('change', () => {
                        const checkedCount = genresContainer.querySelectorAll('input:checked').length;
                        if (checkedCount > 3) {
                            input.checked = false;
                            warning.style.display = 'block';
                        } else {
                            warning.style.display = 'none';
                        }
                    });

                    genresContainer.appendChild(input);
                    genresContainer.appendChild(label);
                });
            })
            .catch(err => console.error("Error:", err));
    }

    lineaSelect.addEventListener('change', function() { loadGenres(this.value); });
    if (lineaSelect.value) { loadGenres(lineaSelect.value); }
</script>

{% endblock %}
